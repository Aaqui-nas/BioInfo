# Template pour projets bibliothèque / toolkit (dépendances minimales, typage strict)
# Usage : copier dans nom-projet/, renommer en pyproject.toml, adapter name/description
#         puis : uv sync
# Ce template convient à BioSeqKit et tout projet conçu comme une lib réutilisable.

[project]
name = "nom-projet"
version = "0.1.0"
description = "Description courte du projet"
requires-python = ">=3.11"
dependencies = []
# Ajouter les dépendances au fur et à mesure avec : uv add <package>

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.4",
    "mypy>=1.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["subjects"]
python_files = ["test_*.py"]
addopts = "--cov=. --cov-report=term-missing"

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "ANN"]

[tool.mypy]
strict = true
python_version = "3.11"
